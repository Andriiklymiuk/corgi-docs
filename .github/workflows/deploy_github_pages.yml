name: Deploy to GitHub Pages to corgi

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-deploy:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test build website
        run: bun run build
  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: webfactory/ssh-agent@v0.5.0
        with:
          ssh-private-key: ${{ secrets.GH_PAGES_DEPLOY }}
      - name: Verify SSH deploy key
        run: |
          echo "=== Loaded keys in ssh-agent ==="
          ssh-add -l || echo "No keys loaded"
          echo ""
          echo "=== Test SSH auth to github.com ==="
          ssh -T -o StrictHostKeyChecking=accept-new git@github.com 2>&1 || true
      - name: Deploy to GitHub Pages
        env:
          USE_SSH: true
        run: |
          git config --global user.email "gradli.inc@gmail.com"
          git config --global user.name "Andriiklymiuk"
          bun install --frozen-lockfile
          bun run deployDocs
